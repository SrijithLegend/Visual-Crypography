<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 26rem; margin: 4rem auto; padding: 0 1rem; }
    h1 { margin-bottom: 1.5rem; }
    label { display: block; margin: 0.75rem 0 0.25rem; font-size: 0.9rem; color: #333; }
    input { width: 100%; padding: 0.5rem; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    button { margin-top: 1.25rem; width: 100%; padding: 0.6rem; border: 0; border-radius: 4px; background: #2563eb; color: #fff; font-size: 1rem; cursor: pointer; }
    .result { margin-top: 1.25rem; padding: 0.75rem; background: #ecfdf5; border: 1px solid #10b981; border-radius: 4px; color: #065f46; }
    .result dl { display: grid; grid-template-columns: auto 1fr; gap: 0.25rem 1rem; margin: 0.5rem 0 0; }
    .result dt { font-weight: 600; }
    .result dd { margin: 0; font-family: ui-monospace, monospace; }
  </style>
</head>
<body>
  <h1>{{ title }}</h1>

  {% if tx %}
  <div class="result">
    <strong>Transaction created</strong>
    <dl>
      <dt>Transaction ID</dt><dd>{{ tx.txid }}</dd>
      <dt>Sender</dt><dd>{{ tx.sender }}</dd>
      <dt>Receiver</dt><dd>{{ tx.receiver }}</dd>
      <dt>Amount</dt><dd>₹{{ "%.2f"|format(tx.amount) }}</dd>
      <dt>Timestamp</dt><dd>{{ tx.timestamp.strftime("%Y-%m-%d %H:%M:%S") }}</dd>
    </dl>
  </div>
  {% endif %}

  <form method="post" action="/send">
    <label for="sender">Sender</label>
    <input id="sender" name="sender" required>

    <label for="receiver">Receiver</label>
    <input id="receiver" name="receiver" required>

    <label for="amount">Amount</label>
    <input id="amount" name="amount" type="number" step="0.01" min="0.01" required>

    <button type="submit">Send</button>
  </form>
</body>
</html>
